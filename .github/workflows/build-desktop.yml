name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Production backend URL (e.g. https://api.flaxie.app)'
        required: true
        default: 'https://api.flaxie.app'

env:
  BACKEND_URL: ${{ github.event.inputs.backend_url || secrets.BACKEND_URL }}

jobs:
  build-mac:
    name: Build macOS (arm64 + x64)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and package
        working-directory: desktop
        env:
          MAIN_VITE_BACKEND_URL: ${{ env.BACKEND_URL }}
          MAIN_VITE_WS_URL: ${{ secrets.WS_URL }}
          MAIN_VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          MAIN_VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable auto code signing — unsigned build for beta
          # To enable: add MAC_CERT_P12_BASE64 secret and remove this line
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run package

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flaxie-mac
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/latest-mac.yml
          retention-days: 30

      - name: Attach to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/latest-mac.yml

  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and package
        working-directory: desktop
        env:
          MAIN_VITE_BACKEND_URL: ${{ env.BACKEND_URL }}
          MAIN_VITE_WS_URL: ${{ secrets.WS_URL }}
          MAIN_VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          MAIN_VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flaxie-windows
          path: |
            desktop/dist/*.exe
            desktop/dist/latest.yml
          retention-days: 30

      - name: Attach to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/*.exe
            desktop/dist/latest.yml
